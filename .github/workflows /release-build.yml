name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 推送 v1.0.0, v2.1.3 等标签时触发
  workflow_dispatch:  # 允许手动触发

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    permissions:
      contents: write  # 需要写入权限才能上传 Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install latest stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Build with cross
        run: cross build --target ${{ matrix.target }} --release

      - name: Package binary (Linux)
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ${{ github.event.repository.name }}-${{ matrix.target }}.tar.gz ${{ github.event.repository.name }}
          echo "ARTIFACT_NAME=${{ github.event.repository.name }}-${{ matrix.target }}.tar.gz" >> $GITHUB_ENV
          echo "ARTIFACT_PATH=target/${{ matrix.target }}/release/${{ github.event.repository.name }}-${{ matrix.target }}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ARTIFACT_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
